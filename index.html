<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pros &amp; Cons</title>
<style id="fontSizeSheet"></style>
<style type="text/css">

* {
  box-sizing: border-box;
}

body {
  font-family: "Chicago", "Geneva", "Charcoal", Arial, sans-serif;
  font-size: 14px;
  background-color: #ffffff;
  background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAIAAAACCAAAAABX3VL4AAAADklEQVQI12NgYGBg+A8AAQQAAd8GNQQAAAAASUVORK5CYII=");
  color: #000000;
  margin: 0;
  padding: 12px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── WINDOW ── */
.window {
  max-width: 680px;
  margin: 0 auto;
  background: #ffffff;
  border: 2px solid #000000;
  box-shadow: 2px 2px 0 #000000;
}

/* ── TITLE BAR ── */
.titlebar {
  background: #ffffff;
  border-bottom: 1px solid #000000;
  padding: 0 4px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  user-select: none;
  position: relative;
}

.titlebar-stripes {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    to bottom,
    #000000 0px, #000000 1px,
    #ffffff 1px, #ffffff 2px
  );
  opacity: 1;
}

.titlebar-title {
  position: relative;
  z-index: 1;
  font-size: 14px;
  font-weight: bold;
  background: #ffffff;
  padding: 0 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 70%;
}

.titlebar-close {
  position: relative;
  z-index: 1;
  width: 12px;
  height: 12px;
  border: 1px solid #000000;
  background: #ffffff;
  flex-shrink: 0;
  cursor: default;
}

/* ── WINDOW BODY ── */
.window-body {
  padding: 10px 12px 8px;
}

/* ── TYPOGRAPHY ── */
.page-title {
  font-size: 20px;
  font-weight: bold;
  text-align: center;
  letter-spacing: 2px;
  margin: 0 0 2px;
  color: #000000;
}

.page-subtitle {
  text-align: center;
  font-size: 13px;
  color: #555555;
  margin-bottom: 10px;
}

.divider {
  border: none;
  border-top: 1px solid #000000;
  margin: 8px 0;
}

/* ── INPUT FIELDS ── */
.field-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
}

.field-label {
  font-size: 14px;
  font-weight: bold;
  white-space: nowrap;
}

input[type="text"] {
  border: 1px solid #000000;
  background: #ffffff;
  font-family: "Geneva", "Charcoal", Arial, sans-serif;
  font-size: 14px;
  color: #000000;
  padding: 2px 4px;
  outline: none;
  border-radius: 0;
  -webkit-appearance: none;
}

input[type="text"]:focus {
  background: #ffffff;
  box-shadow: inset 1px 1px 0 #000000;
}

/* ── SCORE BAR ── */
.score-wrap { margin-bottom: 6px; }

.score-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
}

.score-lbl-pro { color: #1AFF32; font-weight: bold; width: 48px; }
.score-lbl-con { color: #FF4612; font-weight: bold; width: 48px; text-align: right; }

.score-bar-outer {
  flex: 1;
  height: 12px;
  border: 1px solid #000000;
  background: #cccccc;
  position: relative;
  overflow: hidden;
}

.score-bar-pro {
  height: 100%;
  background: #1AFF32;
  position: absolute;
  left: 0; top: 0;
  transition: width 0.2s;
}

.score-bar-con {
  height: 100%;
  background: #FF4612;
  position: absolute;
  right: 0; top: 0;
  transition: width 0.2s;
}

/* ── VERDICT ── */
.verdict-row {
  border: 1px solid #000000;
  background: #eeeeee;
  font-size: 13px;
  padding: 3px 7px;
  margin-bottom: 8px;
  display: none;
}

/* ── COLUMNS ── */
.cols {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
}

.col { flex: 1; min-width: 0; border: 1px solid #000000; }

.col-header {
  font-weight: bold;
  font-size: 14px;
  padding: 2px 7px 3px;
  border-bottom: 1px solid #000000;
  display: flex;
  align-items: center;
  gap: 4px;
  letter-spacing: 1px;
}

.pros-header { background: #1AFF32; color: #000000; }
.cons-header { background: #FF4612; color: #000000; }

.col-count {
  margin-left: auto;
  font-size: 12px;
  font-weight: normal;
  background: #ffffff;
  color: #000000;
  padding: 0 4px;
  border: 1px solid #000000;
  letter-spacing: 0;
  font-family: "Courier New", monospace;
}

/* ── ITEMS ── */
.items-area {
  min-height: 140px;
  background: #ffffff;
  padding: 0;
}

.item-row {
  display: flex;
  align-items: flex-start;
  padding: 2px 5px;
  border-bottom: 1px dotted #aaaaaa;
  gap: 3px;
  animation: flash-in 0.3s;
}

@keyframes flash-in {
  0%   { background: #cccccc; }
  100% { background: transparent; }
}

.item-row:last-child { border-bottom: none; }

.item-bullet {
  font-size: 13px;
  margin-top: 2px;
  flex-shrink: 0;
  width: 9px;
  text-align: center;
  font-weight: bold;
}

.pros-col .item-bullet { color: #1AFF32; }
.cons-col .item-bullet { color: #FF4612; }

.item-text-editable {
  flex: 1;
  font-size: 14px;
  font-family: "Geneva", Arial, sans-serif;
  outline: none;
  min-width: 0;
  word-break: break-word;
  line-height: 1.4;
  cursor: text;
  color: #000000;
}

.item-text-editable:focus {
  background: #eeeeee;
}

.item-del-btn {
  background: none;
  border: none;
  cursor: default;
  font-size: 12px;
  color: #888888;
  padding: 1px 1px 0;
  font-family: Arial, sans-serif;
  line-height: 1;
  flex-shrink: 0;
  margin-top: 2px;
}
.item-del-btn:hover { color: #000000; }

/* ── WEIGHT TOGGLE ── */
.item-bullet {
  cursor: default;
  user-select: none;
}
.item-bullet:hover { text-decoration: underline; }

.item-row.weighted {
  background: #eeeeee;
}
.item-row.weighted .item-text-editable {
  font-weight: bold;
}
.weight-marker {
  font-size: 11px;
  font-weight: bold;
  font-family: "Courier New", monospace;
  color: #444444;
  flex-shrink: 0;
  margin-top: 3px;
  width: 14px;
  text-align: left;
}

.empty-hint {
  padding: 10px 6px;
  color: #888888;
  font-size: 11px;
  text-align: center;
  font-style: italic;
}

/* ── ADD AREA ── */
.add-area {
  border-top: 1px solid #000000;
  padding: 4px 5px;
  display: flex;
  align-items: center;
  gap: 4px;
  background: #eeeeee;
}

.add-area input[type="text"] {
  flex: 1;
  font-size: 13px;
  min-width: 0;
  border: 1px solid #888888;
}

/* ── BUTTONS ── */
.btn {
  background: #ffffff;
  border: 1px solid #000000;
  font-family: "Geneva", "Charcoal", Arial, sans-serif;
  font-size: 13px;
  color: #000000;
  padding: 2px 9px;
  cursor: default;
  border-radius: 0;
  -webkit-appearance: none;
  white-space: nowrap;
}

.btn:active {
  background: #000000;
  color: #ffffff;
}

.btn-default {
  border: 2px solid #000000;
  padding: 1px 8px;
}

/* ── ACTIONS ── */
.actions-bar {
  display: flex;
  gap: 6px;
  align-items: center;
  padding: 4px 0 2px;
}

/* ── FONT SIZE SELECT ── */
select {
  border: 1px solid #000000;
  background: #ffffff;
  font-family: "Geneva", "Charcoal", Arial, sans-serif;
  font-size: 13px;
  color: #000000;
  padding: 2px 4px;
  border-radius: 0;
  -webkit-appearance: none;
  cursor: default;
}

/* ── MOBILE ── */
@media (max-width: 540px) {
  body { padding: 0; }

  input[type="text"],
  select {
    font-size: 16px !important;
  }

  .window {
    max-width: 100%;
    border-left: none;
    border-right: none;
    box-shadow: none;
  }

  .cols {
    flex-direction: column;
    gap: 0;
  }

  .col {
    border-left: none;
    border-right: none;
    border-bottom: none;
  }

  .col:last-child {
    border-bottom: none;
  }

  .items-area {
    min-height: 180px;
  }
}
.status-bar {
  border-top: 1px solid #000000;
  padding: 2px 8px;
  font-size: 12px;
  color: #444444;
  background: #eeeeee;
  display: flex;
  justify-content: space-between;
}

</style>
</head>
<body>

<div class="window">

  <!-- Title bar -->
  <div class="titlebar">
    <div class="titlebar-stripes"></div>
    <div class="titlebar-close"></div>
    <span class="titlebar-title">Pros &amp; Cons &mdash; <span id="titleDecision">Untitled</span></span>
  </div>


  <div class="window-body">

    <div class="page-title">Pros &amp; Cons</div>
    <div class="page-subtitle">Enter a decision, add pros and cons. Click + or &minus; to double an item's weight.</div>

    <hr class="divider">

    <div class="field-row">
      <label class="field-label" for="topicInput">Decision:</label>
      <input type="text" id="topicInput" placeholder="e.g. Should I move to a new city?" maxlength="80" style="flex:1;">
    </div>

    <div class="score-wrap" id="scoreSection" style="display:none;">
      <div class="score-row">
        <span class="score-lbl-pro" id="proScoreLbl">0 pros</span>
        <div class="score-bar-outer">
          <div class="score-bar-pro" id="scoreProFill" style="width:50%;"></div>
          <div class="score-bar-con" id="scoreConFill" style="width:50%;"></div>
        </div>
        <span class="score-lbl-con" id="conScoreLbl">0 cons</span>
      </div>
    </div>

    <div class="verdict-row" id="verdictRow">
      <b>Result:</b> <span id="verdictMsg"></span>
    </div>

    <div class="cols">
      <!-- PROS -->
      <div class="col pros-col">
        <div class="col-header pros-header">
          + PROS
          <span class="col-count" id="proCount">0</span>
        </div>
        <div class="items-area" id="proList">
          <div class="empty-hint" id="proEmpty">(none)</div>
        </div>
        <div class="add-area">
          <input type="text" id="proInput" placeholder="Add a pro...">
          <button class="btn btn-default" onclick="addItem('pros')">Add</button>
        </div>
      </div>

      <!-- CONS -->
      <div class="col cons-col">
        <div class="col-header cons-header">
          &minus; CONS
          <span class="col-count" id="conCount">0</span>
        </div>
        <div class="items-area" id="conList">
          <div class="empty-hint" id="conEmpty">(none)</div>
        </div>
        <div class="add-area">
          <input type="text" id="conInput" placeholder="Add a con...">
          <button class="btn btn-default" onclick="addItem('cons')">Add</button>
        </div>
      </div>
    </div>

    <div class="actions-bar">
      <button class="btn" id="copyBtn" onclick="copyText()">Copy Text</button>
      <label class="field-label" for="fontSizeSelect" style="margin-left:8px;">Text size:</label>
      <select id="fontSizeSelect" onchange="setFontSize(this.value)"></select>
    </div>

  </div><!-- /window-body -->

  <div class="status-bar">
    <span id="statusMsg">Ready.</span>
    <span>Pros &amp; Cons v1.3</span>
  </div>

</div><!-- /window -->

<script type="text/javascript">
var FONT_SIZES = {
  small:  { base: 12, ui: 11, minor: 10 },
  normal: { base: 14, ui: 13, minor: 12 },
  large:  { base: 17, ui: 16, minor: 14 },
  huge:   { base: 21, ui: 19, minor: 17 }
};

function setFontSize(size) {
  var s = FONT_SIZES[size] || FONT_SIZES.normal;
  var sheet = document.getElementById('fontSizeSheet');
  sheet.textContent =
    'body { font-size: ' + s.base + 'px; }' +
    '.titlebar-title { font-size: ' + s.base + 'px; }' +
    '.field-label { font-size: ' + s.base + 'px; }' +
    'input[type="text"] { font-size: ' + s.base + 'px; }' +
    '.item-text-editable { font-size: ' + s.base + 'px; }' +
    '.col-header { font-size: ' + s.base + 'px; }' +
    '.add-area input[type="text"] { font-size: ' + s.ui + 'px; }' +
    '.btn { font-size: ' + s.ui + 'px; }' +
    '.score-row { font-size: ' + s.ui + 'px; }' +
    '.verdict-row { font-size: ' + s.ui + 'px; }' +
    '.page-subtitle { font-size: ' + s.ui + 'px; }' +
    '.item-bullet { font-size: ' + s.ui + 'px; }' +
    '.item-del-btn { font-size: ' + s.ui + 'px; }' +
    '.weight-marker { font-size: ' + s.minor + 'px; }' +
    '.col-count { font-size: ' + s.minor + 'px; }' +
    '.status-bar { font-size: ' + s.minor + 'px; }' +
    'select { font-size: ' + s.ui + 'px; }';
  localStorage.setItem('proscons_fontsize', size);
}

function initFontSelect() {
  var sel = document.getElementById('fontSizeSelect');
  var opts = [['small','Small'],['normal','Normal'],['large','Large'],['huge','Huge']];
  for (var i = 0; i < opts.length; i++) {
    var o = document.createElement('option');
    o.value = opts[i][0];
    o.textContent = opts[i][1];
    sel.appendChild(o);
  }
  var saved = localStorage.getItem('proscons_fontsize') || 'normal';
  sel.value = saved;
  setFontSize(saved);
}



function loadState() {
  try {
    var s = localStorage.getItem('proscons_mac1');
    if (s) {
      var p = JSON.parse(s);
      state.topic = p.topic || '';
      state.pros  = p.pros  || [];
      state.cons  = p.cons  || [];
      document.getElementById('topicInput').value = state.topic;
      if (state.topic) {
        document.getElementById('titleDecision').textContent = state.topic;
        document.title = 'Pros & Cons \u2014 ' + state.topic;
      }
      renderAll();
    }
  } catch(e) {}
}

function saveState() {
  localStorage.setItem('proscons_mac1', JSON.stringify(state));
}

function renderAll() {
  renderList('pros');
  renderList('cons');
  updateScore();
}

function renderList(type) {
  var listEl  = document.getElementById(type === 'pros' ? 'proList'  : 'conList');
  var emptyEl = document.getElementById(type === 'pros' ? 'proEmpty' : 'conEmpty');
  var cntEl   = document.getElementById(type === 'pros' ? 'proCount' : 'conCount');
  var items   = state[type];
  var old = listEl.querySelectorAll('.item-row');
  for (var i = 0; i < old.length; i++) old[i].parentNode.removeChild(old[i]);
  if (items.length === 0) {
    emptyEl.style.display = '';
  } else {
    emptyEl.style.display = 'none';
    for (var i = 0; i < items.length; i++) {
      listEl.appendChild(makeRow(type, items[i], i));
    }
  }
  cntEl.textContent = items.length;
}

function makeRow(type, item, idx) {
  var row = document.createElement('div');
  row.className = 'item-row' + (item.weight === 2 ? ' weighted' : '');

  var bullet = document.createElement('span');
  bullet.className = 'item-bullet';
  bullet.textContent = type === 'pros' ? '+' : '\u2212';
  bullet.title = item.weight === 2 ? 'Click to remove double weight' : 'Click to double this item\u2019s weight';
  (function(tp, ti) {
    bullet.onclick = function() { toggleWeight(tp, ti); };
  })(type, idx);

  var txt = document.createElement('span');
  txt.className = 'item-text-editable';
  txt.contentEditable = 'true';
  txt.spellcheck = true;
  txt.textContent = item.text;
  (function(el, tp, ti) {
    el.addEventListener('blur', function() {
      var v = el.textContent.trim();
      if (v) { state[tp][ti].text = v; saveState(); }
      else   { removeItem(tp, ti); }
    });
    el.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
    });
  })(txt, type, idx);

  var marker = document.createElement('span');
  marker.className = 'weight-marker';
  marker.textContent = item.weight === 2 ? '2x' : '';

  var del = document.createElement('button');
  del.className = 'item-del-btn';
  del.textContent = '\u2715';
  del.title = 'Remove';
  (function(tp, ti) {
    del.onclick = function() { removeItem(tp, ti); };
  })(type, idx);

  row.appendChild(bullet);
  row.appendChild(txt);
  row.appendChild(marker);
  row.appendChild(del);
  return row;
}

function toggleWeight(type, idx) {
  state[type][idx].weight = (state[type][idx].weight === 2) ? 1 : 2;
  saveState();
  renderList(type);
  updateScore();
  setStatus(state[type][idx].weight === 2 ? 'Item doubled.' : 'Item weight reset.');
}

function addItem(type) {
  var id  = type === 'pros' ? 'proInput' : 'conInput';
  var inp = document.getElementById(id);
  var val = inp.value.trim();
  if (!val) { setStatus('Please type something first.'); return; }
  state[type].push({text: val, weight: 1});
  inp.value = '';
  saveState();
  renderList(type);
  updateScore();
  inp.focus();
  setStatus((type === 'pros' ? 'Pro' : 'Con') + ' added.');
}

function removeItem(type, idx) {
  state[type].splice(idx, 1);
  saveState();
  renderList(type);
  updateScore();
  setStatus('Item removed.');
}

function updateScore() {
  var ps = 0, cs = 0;
  for (var i = 0; i < state.pros.length; i++) ps += (state.pros[i].weight || 1);
  for (var i = 0; i < state.cons.length; i++) cs += (state.cons[i].weight || 1);
  var total = ps + cs;
  var ss = document.getElementById('scoreSection');
  var vr = document.getElementById('verdictRow');
  if (total === 0) { ss.style.display = 'none'; vr.style.display = 'none'; return; }
  ss.style.display = '';
  document.getElementById('proScoreLbl').textContent = state.pros.length + (state.pros.length === 1 ? ' pro' : ' pros');
  document.getElementById('conScoreLbl').textContent = state.cons.length + (state.cons.length === 1 ? ' con' : ' cons');
  document.getElementById('scoreProFill').style.width = Math.round(ps / total * 100) + '%';
  document.getElementById('scoreConFill').style.width = Math.round(cs / total * 100) + '%';
  var diff = ps - cs, msg;
  if      (diff === 0) msg = "It\u2019s a tie. More information needed.";
  else if (diff >= 4)  msg = "Pros clearly outweigh the cons.";
  else if (diff > 0)   msg = "Leaning toward yes.";
  else if (diff <= -4) msg = "Cons clearly outweigh the pros.";
  else                 msg = "Leaning toward no.";
  vr.style.display = '';
  document.getElementById('verdictMsg').textContent = msg;
}

function clearAll() {
  if (!confirm('Clear all items?\n\nThis cannot be undone.')) return;
  state.pros = []; state.cons = []; state.topic = '';
  document.getElementById('topicInput').value = '';
  document.getElementById('titleDecision').textContent = 'Untitled';
  document.title = 'Pros & Cons';
  saveState();
  renderAll();
  setStatus('Cleared.');
}

function copyText() {
  var topic = state.topic ? 'Decision: ' + state.topic + '\r\n\r\n' : '';
  var pros  = state.pros.map(function(p) { return '  + ' + p.text; }).join('\r\n');
  var cons  = state.cons.map(function(c) { return '  \u2212 ' + c.text; }).join('\r\n');
  var out   = topic + 'Pros:\r\n' + (pros || '  (none)') + '\r\n\r\nCons:\r\n' + (cons || '  (none)');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(out).then(function() {
      var btn = document.getElementById('copyBtn');
      btn.textContent = 'Copied!';
      setStatus('Copied to clipboard.');
      setTimeout(function() { btn.textContent = 'Copy Text'; }, 1800);
    });
  } else {
    alert(out);
  }
}

function setStatus(msg) {
  document.getElementById('statusMsg').textContent = msg;
}

document.getElementById('proInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') addItem('pros'); });
document.getElementById('conInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') addItem('cons'); });

function scrollToInput(el) {
  setTimeout(function() {
    el.scrollIntoView({behavior: 'smooth', block: 'center'});
  }, 300);
}

var inputs = document.querySelectorAll('input[type="text"]');
for (var i = 0; i < inputs.length; i++) {
  inputs[i].addEventListener('focus', function() { scrollToInput(this); });
}
document.getElementById('topicInput').addEventListener('input', function(e) {
  state.topic = e.target.value;
  var label = state.topic || 'Untitled';
  document.getElementById('titleDecision').textContent = label;
  document.title = 'Pros & Cons \u2014 ' + label;
  saveState();
});

loadState();
initFontSelect();
</script>

</body>
</html>
