<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pros & Cons</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --bg: #F9F7F2;
    --surface: #FFFFFF;
    --border: #E8E4DC;
    --text: #1A1A18;
    --muted: #7A7870;
    --pro: #1D6B45;
    --pro-bg: #E8F5EE;
    --pro-accent: #2D9B65;
    --con: #9B2D2D;
    --con-bg: #FAF0F0;
    --con-accent: #D94B4B;
    --accent: #3B4CCA;
    --accent-light: #EEF0FD;
    --shadow: 0 2px 16px rgba(0,0,0,0.07);
    --radius: 14px;
    --transition: 0.18s ease;
  }
 
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }
 
  /* Header */
  header {
    text-align: center;
    padding: 3rem 1rem 1.5rem;
    position: relative;
  }
 
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1.1;
  }
 
  header p.subtitle {
    margin-top: 0.6rem;
    color: var(--muted);
    font-size: 0.95rem;
    font-weight: 300;
  }
 
  /* Topic input area */
  .topic-section {
    max-width: 640px;
    margin: 0 auto 2rem;
    padding: 0 1rem;
  }
 
  .topic-wrapper {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    box-shadow: var(--shadow);
  }
 
  .topic-wrapper label {
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }
 
  #topicInput {
    flex: 1;
    border: none;
    outline: none;
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 400;
    color: var(--text);
    background: transparent;
    width: 100%;
  }
 
  #topicInput::placeholder {
    color: #C8C4BC;
    font-style: italic;
  }
 
  /* Score bar */
  .score-bar-wrapper {
    max-width: 640px;
    margin: 0 auto 2rem;
    padding: 0 1rem;
  }
 
  .score-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    height: 10px;
    overflow: hidden;
    position: relative;
  }
 
  .score-fill-pro {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: var(--pro-accent);
    border-radius: 100px;
    transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
 
  .score-fill-con {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    background: var(--con-accent);
    border-radius: 100px;
    transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
 
  .score-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 0.5rem;
    font-size: 0.8rem;
  }
 
  .score-labels .pro-label { color: var(--pro); font-weight: 500; }
  .score-labels .con-label { color: var(--con); font-weight: 500; }
  .score-labels .verdict {
    color: var(--muted);
    font-size: 0.75rem;
    font-style: italic;
    text-align: center;
    flex: 1;
  }
 
  /* Main columns */
  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    max-width: 840px;
    margin: 0 auto;
    padding: 0 1rem 3rem;
  }
 
  @media (max-width: 580px) {
    .columns { grid-template-columns: 1fr; }
  }
 
  .column {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: var(--shadow);
  }
 
  .column-header {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 1rem 1.2rem 0.9rem;
    border-bottom: 1px solid var(--border);
  }
 
  .column.pros .column-header { background: var(--pro-bg); }
  .column.cons .column-header { background: var(--con-bg); }
 
  .col-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
    flex-shrink: 0;
  }
 
  .pros .col-icon { background: var(--pro-accent); color: white; }
  .cons .col-icon { background: var(--con-accent); color: white; }
 
  .col-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 600;
  }
 
  .pros .col-title { color: var(--pro); }
  .cons .col-title { color: var(--con); }
 
  .col-count {
    margin-left: auto;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--muted);
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 100px;
    border: 1px solid var(--border);
  }
 
  /* Items list */
  .items-list {
    list-style: none;
    padding: 0;
    min-height: 60px;
  }
 
  .item {
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
    padding: 0.75rem 1.2rem;
    border-bottom: 1px solid var(--border);
    animation: fadeSlide 0.25s ease;
    position: relative;
  }
 
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
 
  .item:last-child { border-bottom: none; }
 
  .item-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-top: 6px;
    flex-shrink: 0;
  }
 
  .pros .item-dot { background: var(--pro-accent); }
  .cons .item-dot { background: var(--con-accent); }
 
  .item-text {
    flex: 1;
    font-size: 0.9rem;
    line-height: 1.45;
    color: var(--text);
    cursor: text;
    outline: none;
    word-break: break-word;
  }
 
  .item-text:focus {
    color: var(--text);
  }
 
  .item-delete {
    opacity: 0;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 16px;
    line-height: 1;
    padding: 0 2px;
    border-radius: 4px;
    transition: opacity var(--transition), color var(--transition);
    flex-shrink: 0;
  }
 
  .item:hover .item-delete { opacity: 1; }
  .item-delete:hover { color: #D94B4B; }
 
  /* Add item input area */
  .add-area {
    padding: 0.65rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }
 
  .add-input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    color: var(--text);
  }
 
  .add-input::placeholder { color: #C0BDB5; }
 
  .add-btn {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 300;
    transition: transform var(--transition), opacity var(--transition);
    flex-shrink: 0;
  }
 
  .pros .add-btn { background: var(--pro-accent); color: white; }
  .cons .add-btn { background: var(--con-accent); color: white; }
  .add-btn:hover { transform: scale(1.1); }
  .add-btn:active { transform: scale(0.95); }
 
  /* Empty state */
  .empty-hint {
    padding: 1.2rem;
    text-align: center;
    color: #C0BDB5;
    font-size: 0.82rem;
    font-style: italic;
  }
 
  /* Verdict banner */
  .verdict-banner {
    max-width: 640px;
    margin: 0 auto 1rem;
    padding: 0 1rem;
  }
 
  .verdict-card {
    background: var(--accent-light);
    border: 1px solid #C4CAF8;
    border-radius: var(--radius);
    padding: 0.9rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    transition: opacity 0.4s ease;
  }
 
  .verdict-icon {
    font-size: 1.3rem;
    flex-shrink: 0;
  }
 
  .verdict-text {
    font-size: 0.875rem;
    color: var(--accent);
    font-weight: 500;
  }
 
  /* Reset button */
  .actions {
    display: flex;
    justify-content: center;
    gap: 0.75rem;
    padding-bottom: 3rem;
  }
 
  .btn-ghost {
    background: none;
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 0.5rem 1.2rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    color: var(--muted);
    cursor: pointer;
    transition: border-color var(--transition), color var(--transition), background var(--transition);
  }
 
  .btn-ghost:hover {
    border-color: var(--text);
    color: var(--text);
    background: var(--surface);
  }
 
  /* Drag-over highlight */
  .column.drag-over .items-list {
    background: rgba(0,0,0,0.03);
    border-radius: 0 0 var(--radius) var(--radius);
  }
 
  /* Weight badges */
  .weight-badge {
    font-size: 10px;
    font-weight: 500;
    padding: 1px 5px;
    border-radius: 4px;
    cursor: pointer;
    user-select: none;
    flex-shrink: 0;
    margin-top: 3px;
    transition: opacity var(--transition);
    opacity: 0;
  }
 
  .pros .weight-badge { background: #C6E8D6; color: #1A5C38; }
  .cons .weight-badge { background: #F5CCCC; color: #8B2020; }
 
  .item:hover .weight-badge { opacity: 1; }
  .weight-badge.active { opacity: 1; }
</style>
</head>
<body>
 
<header>
  <h1>Pros &amp; Cons</h1>
  <p class="subtitle">Lay out both sides. Think it through.</p>
</header>
 
<div class="topic-section">
  <div class="topic-wrapper">
    <label>Decision</label>
    <input id="topicInput" type="text" placeholder="e.g. Moving to a new city" maxlength="80" spellcheck="false">
  </div>
</div>
 
<div class="score-bar-wrapper" id="scoreSection" style="display:none;">
  <div class="score-bar">
    <div class="score-fill-pro" id="scoreProFill" style="width:50%"></div>
    <div class="score-fill-con" id="scoreConFill" style="width:50%"></div>
  </div>
  <div class="score-labels">
    <span class="pro-label" id="proScore">0 pros</span>
    <span class="verdict" id="verdictText"></span>
    <span class="con-label" id="conScore">0 cons</span>
  </div>
</div>
 
<div class="verdict-banner" id="verdictBanner" style="display:none;">
  <div class="verdict-card">
    <span class="verdict-icon" id="verdictIcon">⚖️</span>
    <span class="verdict-text" id="verdictMsg"></span>
  </div>
</div>
 
<div class="columns">
  <!-- PROS -->
  <div class="column pros" id="proCol" 
    ondragover="handleDragOver(event,'pros')" 
    ondragleave="handleDragLeave(event,'pros')" 
    ondrop="handleDrop(event,'pros')">
    <div class="column-header">
      <div class="col-icon">+</div>
      <span class="col-title">Pros</span>
      <span class="col-count" id="proCount">0</span>
    </div>
    <ul class="items-list" id="proList">
      <li class="empty-hint" id="proEmpty">Add your first pro below</li>
    </ul>
    <div class="add-area">
      <input class="add-input" id="proInput" type="text" placeholder="Add a pro..." maxlength="160">
      <button class="add-btn" onclick="addItem('pros')" title="Add pro">+</button>
    </div>
  </div>
 
  <!-- CONS -->
  <div class="column cons" id="conCol"
    ondragover="handleDragOver(event,'cons')"
    ondragleave="handleDragLeave(event,'cons')"
    ondrop="handleDrop(event,'cons')">
    <div class="column-header">
      <div class="col-icon">−</div>
      <span class="col-title">Cons</span>
      <span class="col-count" id="conCount">0</span>
    </div>
    <ul class="items-list" id="conList">
      <li class="empty-hint" id="conEmpty">Add your first con below</li>
    </ul>
    <div class="add-area">
      <input class="add-input" id="conInput" type="text" placeholder="Add a con..." maxlength="160">
      <button class="add-btn" onclick="addItem('cons')" title="Add con">+</button>
    </div>
  </div>
</div>
 
<div class="actions">
  <button class="btn-ghost" onclick="clearAll()">Clear all</button>
  <button class="btn-ghost" onclick="copyToClipboard()">Copy as text</button>
</div>
 
<script>
const state = {
  topic: '',
  pros: [],
  cons: []
};
 
let dragSrc = null;
let dragType = null;
 
function loadState() {
  try {
    const saved = localStorage.getItem('proscons_v2');
    if (saved) {
      const parsed = JSON.parse(saved);
      state.topic = parsed.topic || '';
      state.pros = parsed.pros || [];
      state.cons = parsed.cons || [];
      document.getElementById('topicInput').value = state.topic;
      renderAll();
    }
  } catch(e) {}
}
 
function saveState() {
  localStorage.setItem('proscons_v2', JSON.stringify(state));
}
 
function renderAll() {
  renderList('pros');
  renderList('cons');
  updateScore();
}
 
function renderList(type) {
  const list = document.getElementById(type === 'pros' ? 'proList' : 'conList');
  const emptyEl = document.getElementById(type === 'pros' ? 'proEmpty' : 'conEmpty');
  const items = state[type];
 
  Array.from(list.querySelectorAll('.item')).forEach(el => el.remove());
 
  if (items.length === 0) {
    emptyEl.style.display = '';
  } else {
    emptyEl.style.display = 'none';
    items.forEach((item, idx) => {
      const li = createItemEl(type, item, idx);
      list.appendChild(li);
    });
  }
 
  document.getElementById(type === 'pros' ? 'proCount' : 'conCount').textContent = items.length;
}
 
function createItemEl(type, item, idx) {
  const li = document.createElement('li');
  li.className = 'item';
  li.draggable = true;
  li.dataset.idx = idx;
  li.dataset.type = type;
 
  li.addEventListener('dragstart', (e) => {
    dragSrc = idx;
    dragType = type;
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => li.style.opacity = '0.4', 0);
  });
  li.addEventListener('dragend', () => { li.style.opacity = ''; });
 
  const dot = document.createElement('span');
  dot.className = 'item-dot';
 
  const weightBadge = document.createElement('span');
  weightBadge.className = 'weight-badge' + (item.weight === 2 ? ' active' : '');
  weightBadge.title = 'Mark as important (2x weight)';
  weightBadge.textContent = item.weight === 2 ? '2×' : '2×';
  weightBadge.onclick = () => toggleWeight(type, idx);
 
  const text = document.createElement('span');
  text.className = 'item-text';
  text.contentEditable = true;
  text.spellcheck = true;
  text.textContent = item.text;
  text.addEventListener('blur', () => {
    const newText = text.textContent.trim();
    if (newText) {
      state[type][idx].text = newText;
      saveState();
    } else {
      removeItem(type, idx);
    }
  });
  text.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); text.blur(); }
  });
 
  const del = document.createElement('button');
  del.className = 'item-delete';
  del.innerHTML = '×';
  del.title = 'Remove';
  del.onclick = () => removeItem(type, idx);
 
  li.appendChild(dot);
  li.appendChild(text);
  li.appendChild(weightBadge);
  li.appendChild(del);
  return li;
}
 
function toggleWeight(type, idx) {
  state[type][idx].weight = state[type][idx].weight === 2 ? 1 : 2;
  saveState();
  renderList(type);
  updateScore();
}
 
function addItem(type) {
  const inputId = type === 'pros' ? 'proInput' : 'conInput';
  const input = document.getElementById(inputId);
  const val = input.value.trim();
  if (!val) return;
  state[type].push({ text: val, weight: 1 });
  input.value = '';
  saveState();
  renderList(type);
  updateScore();
  input.focus();
}
 
function removeItem(type, idx) {
  state[type].splice(idx, 1);
  saveState();
  renderList(type);
  updateScore();
}
 
function updateScore() {
  const proScore = state.pros.reduce((s, i) => s + (i.weight || 1), 0);
  const conScore = state.cons.reduce((s, i) => s + (i.weight || 1), 0);
  const total = proScore + conScore;
 
  const scoreSection = document.getElementById('scoreSection');
  const verdictBanner = document.getElementById('verdictBanner');
 
  if (total === 0) {
    scoreSection.style.display = 'none';
    verdictBanner.style.display = 'none';
    return;
  }
 
  scoreSection.style.display = '';
  const proFraction = proScore / total;
  const conFraction = conScore / total;
 
  document.getElementById('scoreProFill').style.width = (proFraction * 100) + '%';
  document.getElementById('scoreConFill').style.width = (conFraction * 100) + '%';
  document.getElementById('proScore').textContent = state.pros.length + (state.pros.length === 1 ? ' pro' : ' pros');
  document.getElementById('conScore').textContent = state.cons.length + (state.cons.length === 1 ? ' con' : ' cons');
 
  let verdictMsg = '';
  let verdictIcon = '⚖️';
  const diff = proScore - conScore;
 
  if (diff === 0) {
    verdictMsg = "It's a tie — you need more information.";
    verdictIcon = '⚖️';
  } else if (diff >= 4) {
    verdictMsg = "The pros clearly outweigh the cons.";
    verdictIcon = '✅';
  } else if (diff > 0) {
    verdictMsg = "Slightly more pros — leaning toward yes.";
    verdictIcon = '🟢';
  } else if (diff <= -4) {
    verdictMsg = "The cons clearly outweigh the pros.";
    verdictIcon = '🔴';
  } else {
    verdictMsg = "Slightly more cons — proceed with caution.";
    verdictIcon = '🟡';
  }
 
  document.getElementById('verdictText').textContent = '';
  document.getElementById('verdictBanner').style.display = '';
  document.getElementById('verdictIcon').textContent = verdictIcon;
  document.getElementById('verdictMsg').textContent = verdictMsg;
}
 
function clearAll() {
  if (!confirm('Clear everything?')) return;
  state.pros = [];
  state.cons = [];
  state.topic = '';
  document.getElementById('topicInput').value = '';
  saveState();
  renderAll();
}
 
function copyToClipboard() {
  const topic = state.topic ? `Decision: ${state.topic}\n\n` : '';
  const pros = state.pros.map(p => `+ ${p.text}${p.weight === 2 ? ' [important]' : ''}`).join('\n');
  const cons = state.cons.map(c => `− ${c.text}${c.weight === 2 ? ' [important]' : ''}`).join('\n');
  const text = `${topic}PROS\n${pros || '(none)'}\n\nCONS\n${cons || '(none)'}`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = [...document.querySelectorAll('.btn-ghost')].find(b => b.textContent.includes('Copy'));
    if (btn) { btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy as text', 1500); }
  });
}
 
// Keyboard: press Enter to add
document.getElementById('proInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') addItem('pros'); });
document.getElementById('conInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') addItem('cons'); });
 
// Topic auto-save
document.getElementById('topicInput').addEventListener('input', (e) => {
  state.topic = e.target.value;
  saveState();
});
 
// Drag & drop reorder
function handleDragOver(e, type) {
  e.preventDefault();
  document.getElementById(type === 'pros' ? 'proCol' : 'conCol').classList.add('drag-over');
}
 
function handleDragLeave(e, type) {
  document.getElementById(type === 'pros' ? 'proCol' : 'conCol').classList.remove('drag-over');
}
 
function handleDrop(e, type) {
  e.preventDefault();
  document.getElementById(type === 'pros' ? 'proCol' : 'conCol').classList.remove('drag-over');
  if (dragSrc === null) return;
 
  const targetEl = e.target.closest('.item');
  const targetIdx = targetEl ? parseInt(targetEl.dataset.idx) : state[type].length;
 
  if (dragType === type) {
    // Reorder within same list
    const [item] = state[type].splice(dragSrc, 1);
    const insertAt = targetIdx > dragSrc ? targetIdx - 1 : targetIdx;
    state[type].splice(insertAt, 0, item);
  } else {
    // Move across lists
    const [item] = state[dragType].splice(dragSrc, 1);
    const insertAt = targetIdx;
    state[type].splice(insertAt, 0, item);
    renderList(dragType);
  }
 
  dragSrc = null;
  dragType = null;
  saveState();
  renderList(type);
  updateScore();
}
 
loadState();
</script>
</body>
</html>
